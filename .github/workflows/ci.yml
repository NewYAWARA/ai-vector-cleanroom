name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install cairo (Ubuntu, for the pycairo preview stack)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev pkg-config
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-preview.txt
      - name: Compile check
        run: python -m py_compile $(git ls-files '*.py')
        shell: bash
      - name: Release preflight
        run: python preflight_check.py
      - name: Run tests
        run: python -m unittest discover -s tests -v
